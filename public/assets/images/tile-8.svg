<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(-300, -100)">
        <!-- Background -->
        <rect width="400" height="400" fill="#fdf6e3" />
        
        <!-- Cat Face (Vector) -->
        <!-- Head -->
        <circle cx="200" cy="210" r="140" fill="#ffb347" />
        
        <!-- Ears -->
        <polygon points="100,120 130,40 180,110" fill="#ffb347" />
        <polygon points="120,110 135,65 160,105" fill="#ff9999" />
        
        <polygon points="300,120 270,40 220,110" fill="#ffb347" />
        <polygon points="280,110 265,65 240,105" fill="#ff9999" />
        
        <!-- Eyes -->
        <ellipse cx="150" cy="180" rx="20" ry="25" fill="white" />
        <circle cx="150" cy="185" r="8" fill="#333333" />
        <ellipse cx="250" cy="180" rx="20" ry="25" fill="white" />
        <circle cx="250" cy="185" r="8" fill="#333333" />
        
        <!-- Nose -->
        <path d="M185,220 Q200,240 215,220 Z" fill="#ff7eb9" />
        
        <!-- Mouth -->
        <path d="M180,245 Q200,265 220,245" stroke="#333333" stroke-width="3" fill="none" />
        
        <!-- Whiskers -->
        <line x1="120" y1="220" x2="50" y2="200" stroke="#333333" stroke-width="2" />
        <line x1="120" y1="235" x2="45" y2="235" stroke="#333333" stroke-width="2" />
        <line x1="120" y1="250" x2="50" y2="270" stroke="#333333" stroke-width="2" />
        
        <line x1="280" y1="220" x2="350" y2="200" stroke="#333333" stroke-width="2" />
        <line x1="280" y1="235" x2="355" y2="235" stroke="#333333" stroke-width="2" />
        <line x1="280" y1="250" x2="350" y2="270" stroke="#333333" stroke-width="2" />
    </g>
    <!-- Hint number in the corner (small and subtle) -->
    <text x="5" y="15" font-family="Arial" font-size="10" fill="rgba(0,0,0,0.3)">8</text>
</svg>