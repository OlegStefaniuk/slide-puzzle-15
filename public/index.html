<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">15 Puzzle</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme-minimal.css">
    <link rel="stylesheet" href="css/theme-retro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="theme-minimal mode-numbers">
    <div class="container">
        <header>
            <h1 data-i18n="title">15 Puzzle</h1>
            <div class="controls">
                <button id="theme-toggle" class="btn-control">
                    <span data-i18n="theme">Theme</span>
                </button>
                <button id="mode-toggle" class="btn-control">
                    <span data-i18n="mode">Mode</span>
                </button>
                <button id="lang-toggle" class="btn-control">
                    <span data-i18n="language">UA / EN</span>
                </button>
            </div>
        </header>

        <main>
            <div id="game-board" class="board">
                <!-- Tiles will be generated by JS -->
            </div>

            <div class="stats">
                <div class="stat-item">
                    <span data-i18n="moves">Moves</span>: <span id="move-count">0</span>
                </div>
                <div class="stat-item">
                    <span data-i18n="time">Time</span>: <span id="timer-display">00:00</span>
                </div>
            </div>

            <div class="actions">
                <button id="new-game" class="btn-primary" data-i18n="newGame">New Game</button>
            </div>
        </main>
    </div>

    <!-- Win Modal -->
    <div id="win-modal" class="modal hidden">
        <div class="modal-content">
            <h2 data-i18n="winMessage">Congratulations! You solved the puzzle!</h2>
            <div class="final-stats">
                <p><span data-i18n="moves">Moves</span>: <span id="final-moves">0</span></p>
                <p><span data-i18n="time">Time</span>: <span id="final-time">00:00</span></p>
            </div>
            <button id="play-again" class="btn-primary" data-i18n="playAgain">Play Again</button>
        </div>
    </div>

    <div class="scanline"></div>

    <!-- Scripts -->
    <script src="js/game.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/board.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
